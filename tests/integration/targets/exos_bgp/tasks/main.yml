---
- name: Test exos_bgp module
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create bgp (check mode)
      stevefulme1.extremenetworks.exos_bgp:
        host: "{{ test_host }}"
        name: "test-bgp"
        state: present
      check_mode: true
      register: check_result
      ignore_errors: true

    - name: Verify check mode reports changed
      ansible.builtin.assert:
        that:
          - check_result is changed or check_result is failed
        fail_msg: "Check mode did not report changed"

    - name: List bgps
      stevefulme1.extremenetworks.exos_bgp_info:
        host: "{{ test_host }}"
      register: list_result
      ignore_errors: true

    - name: Verify list returns a list
      ansible.builtin.assert:
        that:
          - list_result.bgps is defined or list_result is failed
        fail_msg: "List did not return expected structure"

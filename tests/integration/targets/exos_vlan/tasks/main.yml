---
# Integration tests for stevefulme1.extremenetworks.exos_vlan
# These tests require valid credentials configured in integration_config.yml

- name: Create exos_vlan (check_mode)
  stevefulme1.extremenetworks.exos_vlan:
    host: "{{ extremenetworks_host }}"
    api_key: "{{ extremenetworks_api_key }}"
    state: present
    name: "ansible-test-{{ resource_prefix }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  check_mode: true
  register: check_result

- name: Verify check_mode reports changed
  ansible.builtin.assert:
    that:
      - check_result is changed

- name: Create exos_vlan
  stevefulme1.extremenetworks.exos_vlan:
    host: "{{ extremenetworks_host }}"
    api_key: "{{ extremenetworks_api_key }}"
    state: present
    name: "ansible-test-{{ resource_prefix }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  register: create_result

- name: Verify exos_vlan was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.exos_vlan is defined

- name: Create exos_vlan again (idempotency)
  stevefulme1.extremenetworks.exos_vlan:
    host: "{{ extremenetworks_host }}"
    api_key: "{{ extremenetworks_api_key }}"
    state: present
    name: "ansible-test-{{ resource_prefix }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  register: idem_result

- name: Verify idempotent create
  ansible.builtin.assert:
    that:
      - idem_result is not changed

- name: Delete exos_vlan (check_mode)
  stevefulme1.extremenetworks.exos_vlan:
    host: "{{ extremenetworks_host }}"
    api_key: "{{ extremenetworks_api_key }}"
    state: absent
    name: "ansible-test-{{ resource_prefix }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  check_mode: true
  register: delete_check

- name: Verify check_mode delete reports changed
  ansible.builtin.assert:
    that:
      - delete_check is changed

- name: Delete exos_vlan
  stevefulme1.extremenetworks.exos_vlan:
    host: "{{ extremenetworks_host }}"
    api_key: "{{ extremenetworks_api_key }}"
    state: absent
    name: "ansible-test-{{ resource_prefix }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  register: delete_result

- name: Verify exos_vlan was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed

- name: Delete exos_vlan again (idempotent)
  stevefulme1.extremenetworks.exos_vlan:
    host: "{{ extremenetworks_host }}"
    api_key: "{{ extremenetworks_api_key }}"
    state: absent
    name: "ansible-test-{{ resource_prefix }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  register: delete_idem

- name: Verify idempotent delete
  ansible.builtin.assert:
    that:
      - delete_idem is not changed

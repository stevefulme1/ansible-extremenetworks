---
- name: Test exos_lag module
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create lag (check mode)
      stevefulme1.extremenetworks.exos_lag:
        host: "{{ test_host }}"
        name: "test-lag"
        state: present
      check_mode: true
      register: check_result
      ignore_errors: true

    - name: Verify check mode reports changed
      ansible.builtin.assert:
        that:
          - check_result is changed or check_result is failed
        fail_msg: "Check mode did not report changed"

    - name: List lags
      stevefulme1.extremenetworks.exos_lag_info:
        host: "{{ test_host }}"
      register: list_result
      ignore_errors: true

    - name: Verify list returns a list
      ansible.builtin.assert:
        that:
          - list_result.lags is defined or list_result is failed
        fail_msg: "List did not return expected structure"

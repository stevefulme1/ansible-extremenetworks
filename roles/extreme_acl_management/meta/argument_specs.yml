---
argument_specs:
  main:
    short_description: "Deploy and manage ACL policies"
    options:
      extreme_acl_management_host:
        description: Target host address
        type: str
        required: true
      extreme_acl_management_username:
        description: Authentication username
        type: str
      extreme_acl_management_password:
        description: Authentication password
        type: str
      extreme_acl_management_api_key:
        description: API key for authentication
        type: str
      extreme_acl_management_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      extreme_acl_management_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]

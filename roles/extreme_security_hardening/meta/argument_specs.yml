---
argument_specs:
  main:
    short_description: "Apply network security best practices"
    options:
      extreme_security_hardening_host:
        description: Target host address
        type: str
        required: true
      extreme_security_hardening_username:
        description: Authentication username
        type: str
      extreme_security_hardening_password:
        description: Authentication password
        type: str
        no_log: true
      extreme_security_hardening_api_key:
        description: API key for authentication
        type: str
        no_log: true
      extreme_security_hardening_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      extreme_security_hardening_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]

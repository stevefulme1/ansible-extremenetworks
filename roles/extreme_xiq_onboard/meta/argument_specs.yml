---
argument_specs:
  main:
    short_description: "Onboard devices to ExtremeCloud IQ"
    options:
      extreme_xiq_onboard_host:
        description: Target host address
        type: str
        required: true
      extreme_xiq_onboard_username:
        description: Authentication username
        type: str
      extreme_xiq_onboard_password:
        description: Authentication password
        type: str
        no_log: true
      extreme_xiq_onboard_api_key:
        description: API key for authentication
        type: str
        no_log: true
      extreme_xiq_onboard_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      extreme_xiq_onboard_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]

---
# VLANs
baseline_vlans:
  - id: 1
    name: "Default"
  - id: 100
    name: "Management"
  - id: 200
    name: "Servers"

# STP
baseline_stp_enabled: true
baseline_stp_mode: "rstp"
baseline_stp_priority: 32768
baseline_stp_hello_time: 2
baseline_stp_forward_delay: 15
baseline_stp_max_age: 20

# SNMP
baseline_snmp_enabled: true
baseline_snmp_community_ro: "{{ lookup('env', 'SNMP_COMMUNITY_RO') | default('public', true) }}"
baseline_snmp_community_rw: "{{ lookup('env', 'SNMP_COMMUNITY_RW') | default('private', true) }}"
baseline_snmp_location: ""
baseline_snmp_contact: ""
baseline_snmp_trap_targets: []
#   - host: "10.0.0.100"
#     port: 162
#     community: "{{ baseline_snmp_community_ro }}"

# NTP
baseline_ntp_enabled: true
baseline_ntp_servers:
  - "pool.ntp.org"
baseline_ntp_timezone: "UTC"

# Syslog
baseline_syslog_enabled: true
baseline_syslog_servers: []
#   - host: "10.0.0.200"
#     port: 514
#     facility: "local7"
#     severity: "informational"

# DNS
baseline_dns_servers: []
baseline_dns_domain: ""

# Banner
baseline_banner: ""

# Save config
baseline_save_config: true

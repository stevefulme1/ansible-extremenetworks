---
# VLANs
switch_baseline_vlans:
  - id: 1
    name: "Default"
  - id: 100
    name: "Management"
  - id: 200
    name: "Servers"

# STP
switch_baseline_stp_enabled: true
switch_baseline_stp_mode: "rstp"
switch_baseline_stp_priority: 32768
switch_baseline_stp_hello_time: 2
switch_baseline_stp_forward_delay: 15
switch_baseline_stp_max_age: 20

# SNMP
switch_baseline_snmp_enabled: true
switch_baseline_snmp_community_ro: "{{ lookup('env', 'SNMP_COMMUNITY_RO') | default('public', true) }}"
switch_baseline_snmp_community_rw: "{{ lookup('env', 'SNMP_COMMUNITY_RW') | default('private', true) }}"
switch_baseline_snmp_location: ""
switch_baseline_snmp_contact: ""
switch_baseline_snmp_trap_targets: []
#   - host: "10.0.0.100"
#     port: 162
#     community: "{{ switch_baseline_snmp_community_ro }}"

# NTP
switch_baseline_ntp_enabled: true
switch_baseline_ntp_servers:
  - "pool.ntp.org"
switch_baseline_ntp_timezone: "UTC"

# Syslog
switch_baseline_syslog_enabled: true
switch_baseline_syslog_servers: []
#   - host: "10.0.0.200"
#     port: 514
#     facility: "local7"
#     severity: "informational"

# DNS
switch_baseline_dns_servers: []
switch_baseline_dns_domain: ""

# Banner
switch_baseline_banner: ""

# Save config
switch_baseline_save_config: true

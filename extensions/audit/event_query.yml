---
# extensions/audit/event_query.yml
# Maps Extreme Networks module return values to the AAP Normalized Resource Taxonomy.
# EXOS/SLX-OS/VOSS modules return resource dicts with "id" and "name" fields.
# XIQ modules (cloud-managed) return device dicts with "id" and "name" fields.

stevefulme1.extremenetworks.exos_vlan:
  query: >-
    {
      name: .vlan.name,
      canonical_facts: {
        uuid: .vlan.id
      },
      facts: {
        device_type: "switch"
      }
    }

stevefulme1.extremenetworks.exos_interface:
  query: >-
    {
      name: .interface.name,
      canonical_facts: {
        uuid: .interface.id
      },
      facts: {
        device_type: "switch"
      }
    }

